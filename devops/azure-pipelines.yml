# ============================================================
# DevPilot — Azure DevOps Pipeline
#
# Strategy: build images on the CI agent, save as compressed
# tar archives, copy to production server via SSH, then load
# and restart containers with docker compose.
# No external registry needed — images travel as artifacts.
# ============================================================

trigger:
  branches:
    include:
      - main

pr: none   # only deploy on direct pushes to main

variables:
  # Secrets are stored in Pipelines → Library → devpilot-production variable group.
  # Create the group there with all required variables before running the pipeline.
  - group: devpilot-production
  - name: DEPLOY_DIR
    value: /opt/devpilot
  - name: BUILD_DIR
    value: $(Build.ArtifactStagingDirectory)/images

# ── Stage 1 — Build ─────────────────────────────────────────
stages:
  - stage: Build
    displayName: "Build Docker images"
    jobs:
      # Build backend and frontend in parallel
      - job: BuildBackend
        displayName: "Build devpilot-backend"
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: Docker@2
            displayName: "docker build — backend"
            inputs:
              command: build
              repository: devpilot-backend
              dockerfile: backend/Dockerfile
              # Repository root so COPY backend/src/, backend/docker-entrypoint.sh, certs/ work
              buildContext: $(Build.SourcesDirectory)
              tags: latest
              arguments: "--no-cache"

          - script: |
              mkdir -p $(BUILD_DIR)
              docker save devpilot-backend:latest | gzip > $(BUILD_DIR)/backend.tar.gz
              echo "Backend image size: $(du -sh $(BUILD_DIR)/backend.tar.gz)"
            displayName: "Export backend image"

          - publish: $(BUILD_DIR)/backend.tar.gz
            artifact: backend-image
            displayName: "Publish backend artifact"

      - job: BuildFrontend
        displayName: "Build devpilot-frontend"
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: Docker@2
            displayName: "docker build — frontend"
            inputs:
              command: build
              repository: devpilot-frontend
              dockerfile: frontend/Dockerfile
              buildContext: frontend
              tags: latest
              arguments: "--no-cache"

          - script: |
              mkdir -p $(BUILD_DIR)
              docker save devpilot-frontend:latest | gzip > $(BUILD_DIR)/frontend.tar.gz
              echo "Frontend image size: $(du -sh $(BUILD_DIR)/frontend.tar.gz)"
            displayName: "Export frontend image"

          - publish: $(BUILD_DIR)/frontend.tar.gz
            artifact: frontend-image
            displayName: "Publish frontend artifact"

      - job: BuildManager
        displayName: "Build devpilot-manager"
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: Docker@2
            displayName: "docker build — sandbox-manager"
            inputs:
              command: build
              repository: devpilot-manager
              dockerfile: infra/sandbox/manager/Dockerfile
              buildContext: $(Build.SourcesDirectory)
              tags: latest
              arguments: "--no-cache"

          - script: |
              mkdir -p $(BUILD_DIR)
              docker save devpilot-manager:latest | gzip > $(BUILD_DIR)/manager.tar.gz
              echo "Manager image size: $(du -sh $(BUILD_DIR)/manager.tar.gz)"
            displayName: "Export manager image"

          - publish: $(BUILD_DIR)/manager.tar.gz
            artifact: manager-image
            displayName: "Publish manager artifact"

      - job: BuildDesktop
        displayName: "Build devpilot-desktop"
        pool:
          vmImage: ubuntu-latest
        timeoutInMinutes: 60
        steps:
          # Zed's Cursor Dark theme is copied from this file when setup.sh runs. If it is
          # missing from the repo, the image builds without ~/.config/zed/themes/cursor.json
          # and the editor falls back to a light (white) UI. Commit infra/sandbox/cursor.json.
          - script: |
              set -euo pipefail
              f="$(Build.SourcesDirectory)/infra/sandbox/cursor.json"
              if [ ! -f "$f" ] || [ ! -s "$f" ]; then
                echo "##[error]Missing or empty: infra/sandbox/cursor.json"
                echo "Add and commit infra/sandbox/cursor.json. See infra/sandbox/README.md (Zed IDE)."
                exit 1
              fi
              if ! grep -q 'Cursor Dark' "$f"; then
                echo "##[error]infra/sandbox/cursor.json does not look like the Cursor theme (expected 'Cursor Dark')."
                exit 1
              fi
              echo "OK: $(wc -c < "$f") bytes, theme name present"
            displayName: "Assert infra/sandbox/cursor.json (Zed Cursor theme)"

          - script: |
              cd $(Build.SourcesDirectory)
              BUILD_ONLY=1 bash infra/sandbox/setup.sh
            displayName: "Generate Dockerfile & build desktop image"

          - script: |
              mkdir -p $(BUILD_DIR)
              docker save devpilot-desktop:latest | gzip > $(BUILD_DIR)/desktop.tar.gz
              echo "Desktop image size: $(du -sh $(BUILD_DIR)/desktop.tar.gz)"
            displayName: "Export desktop image"

          - publish: $(BUILD_DIR)/desktop.tar.gz
            artifact: desktop-image
            displayName: "Publish desktop artifact"

  # ── Stage 2 — Deploy ─────────────────────────────────────
  - stage: Deploy
    displayName: "Deploy to production"
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployProduction
        displayName: "Deploy via SSH"
        pool:
          vmImage: ubuntu-latest
        environment: production
        strategy:
          runOnce:
            deploy:
              steps:

                # 0) Checkout source so devops/ folder is available on the agent
                - checkout: self
                  displayName: "Checkout source (for devops/docker-compose.prod.yml)"

                # 1) Download all image artifacts
                - download: current
                  artifact: backend-image
                  displayName: "Download backend image"

                - download: current
                  artifact: frontend-image
                  displayName: "Download frontend image"

                - download: current
                  artifact: manager-image
                  displayName: "Download manager image"

                - download: current
                  artifact: desktop-image
                  displayName: "Download desktop image"

                # 2) Generate .env from pipeline secret variables + static config
                - script: |
                    mkdir -p $(Pipeline.Workspace)/deploy
                    cat > $(Pipeline.Workspace)/deploy/.env <<EOF
                    # ── Database ──────────────────────────────────────────────
                    DB_USER=$(DB_USER)
                    DB_PASSWORD=$(DB_PASSWORD)
                    DB_NAME=$(DB_NAME)

                    # ── JWT ───────────────────────────────────────────────────
                    JWT_SECRET_KEY=$(JWT_SECRET_KEY)

                    # ── Sandbox / VPS ─────────────────────────────────────────
                    MANAGER_API_KEY=$(MANAGER_API_KEY)
                    PUBLIC_IP=$(PUBLIC_IP)
                    VPS__GatewayUrl=http://sandbox-manager:8090
                    # HTTPS proxy base for sandbox-manager (optional): makes manager return
                    # https:// URLs for VNC/bridge when the SPA is on HTTPS (mixed content).
                    HTTPS_PROXY_BASE=https://$(PUBLIC_IP)

                    # ── Super-admin designation ────────────────────────────────────────
                    # Users logging in with this email receive the "admin" JWT role claim
                    # and can manage shared AI providers for all users.
                    ADMIN_EMAIL=$(ADMIN_EMAIL)

                    # ── Frontend ──────────────────────────────────────────────
                    API_URL=$(API_URL)

                    # ── Local auth (always enabled for fallback) ───────────────
                    AuthProviders__Local__Enabled=true

                    # ── GitHub OAuth ──────────────────────────────────────────
                    AuthProviders__GitHub__Enabled=true
                    AuthProviders__GitHub__Type=BackendOAuth
                    AuthProviders__GitHub__ClientId=$(AuthProviders__GitHub__ClientId)
                    AuthProviders__GitHub__ClientSecret=$(AuthProviders__GitHub__ClientSecret)
                    AuthProviders__GitHub__RedirectUri=https://$(PUBLIC_IP)/auth/callback/GitHub
                    AuthProviders__GitHub__Scopes=repo,read:org

                    # ── Azure AD OIDC ─────────────────────────────────────────
                    # ClientId   = Azure App Registration client ID (backend validates tokens)
                    # SpaClientId = Azure App Registration client ID used by the Angular SPA
                    #               (can differ if backend and frontend use separate App Registrations)
                    AuthProviders__AzureAd__Enabled=true
                    AuthProviders__AzureAd__Type=FrontendOidc
                    AuthProviders__AzureAd__ClientId=$(AuthProviders__AzureAd__ClientId)
                    AuthProviders__AzureAd__SpaClientId=$(AuthProviders__AzureAd__SpaClientId)
                    AuthProviders__AzureAd__TenantId=$(AuthProviders__AzureAd__TenantId)
                    AuthProviders__AzureAd__Authority=https://login.microsoftonline.com/$(AuthProviders__AzureAd__TenantId)/v2.0
                    AuthProviders__AzureAd__Scopes=openid profile email User.Read
                    AuthProviders__AzureAd__ProfileEndpoint=https://graph.microsoft.com/v1.0/me

                    # ── Duende (disabled in production — local dev only) ───────
                    AuthProviders__Duende__Enabled=false

                    # ── AI ────────────────────────────────────────────────────
                    AI_ENDPOINT=$(AI_ENDPOINT)
                    AI_API_KEY=$(AI_API_KEY)
                    AI_MODEL=$(AI_MODEL)
                    EOF
                  displayName: "Generate .env file"

                # 3a) Ensure deploy directories exist on the server
                - task: SSH@0
                  displayName: "Create deploy directories on server"
                  inputs:
                    sshEndpoint: 'production-server-password'
                    runOptions: commands
                    commands: |
                      mkdir -p $(DEPLOY_DIR)/images
                      echo "Deploy dirs ready: $(DEPLOY_DIR) and $(DEPLOY_DIR)/images"

                # 3b) Copy docker-compose.prod.yml and .env to server
                - task: CopyFilesOverSSH@0
                  displayName: "Copy compose + env to server"
                  inputs:
                    sshEndpoint: 'production-server-password'
                    sourceFolder: $(System.DefaultWorkingDirectory)/devops
                    contents: docker-compose.prod.yml
                    targetFolder: $(DEPLOY_DIR)
                    cleanTargetFolder: false
                    overwrite: true

                - task: CopyFilesOverSSH@0
                  displayName: "Copy .env to server"
                  inputs:
                    sshEndpoint: 'production-server-password'
                    sourceFolder: $(Pipeline.Workspace)/deploy
                    contents: .env
                    targetFolder: $(DEPLOY_DIR)
                    cleanTargetFolder: false
                    overwrite: true

                # 4) Copy image tarballs to server
                - task: CopyFilesOverSSH@0
                  displayName: "Copy backend image"
                  inputs:
                    sshEndpoint: 'production-server-password'
                    sourceFolder: $(Pipeline.Workspace)/backend-image
                    contents: backend.tar.gz
                    targetFolder: $(DEPLOY_DIR)/images
                    cleanTargetFolder: false
                    overwrite: true

                - task: CopyFilesOverSSH@0
                  displayName: "Copy frontend image"
                  inputs:
                    sshEndpoint: 'production-server-password'
                    sourceFolder: $(Pipeline.Workspace)/frontend-image
                    contents: frontend.tar.gz
                    targetFolder: $(DEPLOY_DIR)/images
                    cleanTargetFolder: false
                    overwrite: true

                - task: CopyFilesOverSSH@0
                  displayName: "Copy manager image"
                  inputs:
                    sshEndpoint: 'production-server-password'
                    sourceFolder: $(Pipeline.Workspace)/manager-image
                    contents: manager.tar.gz
                    targetFolder: $(DEPLOY_DIR)/images
                    cleanTargetFolder: false
                    overwrite: true

                - task: CopyFilesOverSSH@0
                  displayName: "Copy desktop image"
                  inputs:
                    sshEndpoint: 'production-server-password'
                    sourceFolder: $(Pipeline.Workspace)/desktop-image
                    contents: desktop.tar.gz
                    targetFolder: $(DEPLOY_DIR)/images
                    cleanTargetFolder: false
                    overwrite: true

                # 5) Load images + restart containers on server
                # Using absolute paths throughout — SSH@0 'commands' mode does not
                # guarantee that 'cd' persists between lines in all agent versions.
                - task: SSH@0
                  displayName: "Load images and restart stack"
                  inputs:
                    sshEndpoint: 'production-server-password'
                    runOptions: commands
                    # failOnStdErr: false — docker compose writes progress to stderr;
                    # this prevents the SSH task from failing on informational output.
                    failOnStdErr: false
                    commands: |
                      echo "==> Loading Docker images..."
                      docker load < /opt/devpilot/images/backend.tar.gz
                      docker load < /opt/devpilot/images/frontend.tar.gz
                      docker load < /opt/devpilot/images/manager.tar.gz
                      docker load < /opt/devpilot/images/desktop.tar.gz

                      echo "==> Pulling postgres image..."
                      docker pull postgres:16-alpine

                      echo "==> Stopping any existing stack..."
                      docker compose -f /opt/devpilot/docker-compose.prod.yml --env-file /opt/devpilot/.env down --remove-orphans 2>&1 || true
                      echo "==> Killing any Docker container holding ports 80/5000/8090..."
                      docker ps -q | xargs -r docker inspect --format='{{.Id}} {{range $p,$conf := .NetworkSettings.Ports}}{{$p}} {{end}}' | grep -E '80/tcp|5000/tcp|8090/tcp' | awk '{print $1}' | xargs -r docker stop 2>/dev/null || true
                      docker ps -q | xargs -r docker inspect --format='{{.Id}} {{range $p,$conf := .NetworkSettings.Ports}}{{$p}} {{end}}' | grep -E '80/tcp|5000/tcp|8090/tcp' | awk '{print $1}' | xargs -r docker rm -f 2>/dev/null || true
                      echo "==> Killing any native process holding port 8090 (old Python manager)..."
                      fuser -k 8090/tcp 2>/dev/null || true
                      sleep 2
                      echo "==> Ports after cleanup:"
                      ss -tlnp | grep -E ':80 |:5000 |:8090 ' || echo "  All clear"

                      echo "==> Restarting stack..."
                      docker compose -f /opt/devpilot/docker-compose.prod.yml --env-file /opt/devpilot/.env up -d --remove-orphans 2>&1

                      echo "==> Cleaning up compressed archives..."
                      rm -f /opt/devpilot/images/backend.tar.gz /opt/devpilot/images/frontend.tar.gz /opt/devpilot/images/manager.tar.gz /opt/devpilot/images/desktop.tar.gz

                      echo "==> Removing dangling images to free disk space..."
                      docker image prune -f 2>&1

                      echo "==> Stack status:"
                      docker compose -f /opt/devpilot/docker-compose.prod.yml ps 2>&1

                      echo "==> Deployment complete!"
