server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS so nginx starts even if backend is temporarily down
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Angular routing — always fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy REST API calls to backend
    location /api {
        set $backend http://devpilot-backend:8080;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy SignalR hubs (WebSocket upgrade required)
    location /hubs {
        set $backend http://devpilot-backend:8080;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
