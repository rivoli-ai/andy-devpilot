services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     ${DB_USER:-analyser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-analyser_password}
      POSTGRES_DB:       ${DB_NAME:-analyzer}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-analyser} -d ${DB_NAME:-analyzer}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend (.NET API) ────────────────────────────────────────────────────────
  devpilot-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    # All variables from root .env are passed through (JWT, AuthProviders, AI, etc.)
    # Variables below override only the ones that differ inside Docker (service hostnames).
    env_file: .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Username=${DB_USER:-analyser};Password=${DB_PASSWORD:-analyser_password};Database=${DB_NAME:-analyzer}"
      JWT__SecretKey: ${JWT_SECRET_KEY}
      # VPS__GatewayUrl comes from env_file (.env) — patched by start.sh/start.ps1
      VPS__ManagerApiKey: ${MANAGER_API_KEY}
      VPS__PublicIp:      ${PUBLIC_IP:-localhost}
      VPS__Enabled:       "true"
    extra_hosts:
      # Allows the backend container to reach host ports (e.g. K8s NodePorts) on Linux
      - "host.docker.internal:host-gateway"
    volumes:
      - ./certs:/usr/local/share/ca-certificates/custom:ro
    ports:
      - "5000:5000"

  # ── Frontend (Angular + nginx) ────────────────────────────────────────────────
  devpilot-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - devpilot-backend
    environment:
      # Relative URL works when the frontend is served from the same host as the backend
      # (nginx proxies /api → devpilot-backend:5000).
      # Override with a full URL (e.g. https://api.example.com/api) for split-host setups.
      API_URL: ${API_URL:-/api}
    ports:
      - "8000:80"

  # One-shot: creates ./.sandbox-cache/* on the host so Docker can bind-mount them into the manager
  # (avoids POST /sandboxes 500 when the daemon cannot mkdir the mount source path).
  sandbox-cache-init:
    image: alpine:3.20
    pull_policy: if_not_present
    volumes:
      - .:/mnt:rw
    command:
      - /bin/sh
      - -c
      - >-
        mkdir -p /mnt/.sandbox-cache/npm /mnt/.sandbox-cache/nuget /mnt/.sandbox-cache/pip &&
        chmod 1777 /mnt/.sandbox-cache/npm /mnt/.sandbox-cache/nuget /mnt/.sandbox-cache/pip 2>/dev/null || true
    restart: "no"

  # ── Sandbox Manager (Python Flask) ───────────────────────────────────────────
  sandbox-manager:
    image: devpilot-manager:latest
    build:
      context: .
      dockerfile: infra/sandbox/manager/Dockerfile
    depends_on:
      sandbox-cache-init:
        condition: service_completed_successfully
    environment:
      MANAGER_API_KEY: ${MANAGER_API_KEY}
      HOST_IP:         ${PUBLIC_IP:-localhost}
      BACKEND:         docker
      # Local default: image built by infra/sandbox/setup.sh. Override after docker push, e.g. YOUR_USER/devpilot-desktop:latest
      SANDBOX_IMAGE:   ${SANDBOX_IMAGE:-devpilot-desktop:latest}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./certs:/certs:ro
      # Host tool caches → manager discovers these mounts and re-binds into each sandbox.
      # Defaults live under the repo so Docker Desktop for Mac can bind-mount without adding /opt
      # under Settings → Resources → File Sharing. Override with DEVPILOT_*_HOST for /opt/... on Linux.
      - ${DEVPILOT_NPM_CACHE_HOST:-./.sandbox-cache/npm}:/opt/npm-cache
      - ${DEVPILOT_NUGET_CACHE_HOST:-./.sandbox-cache/nuget}:/opt/nuget-cache
      - ${DEVPILOT_PIP_CACHE_HOST:-./.sandbox-cache/pip}:/opt/pip-cache
    ports:
      - "8090:8090"

volumes:
  postgres_data:
