services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     ${DB_USER:-analyser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-analyser_password}
      POSTGRES_DB:       ${DB_NAME:-analyzer}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-analyser} -d ${DB_NAME:-analyzer}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend (.NET API) ────────────────────────────────────────────────────────
  devpilot-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    # All variables from root .env are passed through (JWT, AuthProviders, AI, etc.)
    # Variables below override only the ones that differ inside Docker (service hostnames).
    env_file: .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Username=${DB_USER:-analyser};Password=${DB_PASSWORD:-analyser_password};Database=${DB_NAME:-analyzer}"
      JWT__SecretKey: ${JWT_SECRET_KEY}
      # VPS__GatewayUrl comes from env_file (.env) — patched by start.sh/start.ps1
      VPS__ManagerApiKey: ${MANAGER_API_KEY}
      VPS__PublicIp:      ${PUBLIC_IP:-localhost}
      VPS__Enabled:       "true"
    extra_hosts:
      # Allows the backend container to reach host ports (e.g. K8s NodePorts) on Linux
      - "host.docker.internal:host-gateway"
    volumes:
      - ./certs:/usr/local/share/ca-certificates/custom:ro
    ports:
      - "5000:5000"

  # ── Frontend (Angular + nginx) ────────────────────────────────────────────────
  devpilot-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - devpilot-backend
    environment:
      # Relative URL works when the frontend is served from the same host as the backend
      # (nginx proxies /api → devpilot-backend:5000).
      # Override with a full URL (e.g. https://api.example.com/api) for split-host setups.
      API_URL: ${API_URL:-/api}
    ports:
      - "80:80"

  # ── Sandbox Manager (Python Flask) ───────────────────────────────────────────
  sandbox-manager:
    image: devpilot-manager:latest
    build:
      context: .
      dockerfile: infra/sandbox/manager/Dockerfile
    environment:
      MANAGER_API_KEY: ${MANAGER_API_KEY}
      HOST_IP:         ${PUBLIC_IP:-localhost}
      BACKEND:         docker
      # Local default: image built by infra/sandbox/setup.sh. Override after docker push, e.g. YOUR_USER/devpilot-desktop:latest
      SANDBOX_IMAGE:   ${SANDBOX_IMAGE:-devpilot-desktop:latest}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./certs:/certs:ro
    ports:
      - "8090:8090"
      # Sandbox ports (6100-6200 noVNC, 7100-7200 Bridge API) are bound directly
      # to the host by the sandbox containers themselves — do NOT pre-allocate here.

volumes:
  postgres_data:
