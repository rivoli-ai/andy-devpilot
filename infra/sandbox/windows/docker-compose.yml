services:
  sandbox-manager:
    build:
      context: ../../..
      dockerfile: infra/sandbox/windows/Dockerfile.manager
    image: devpilot-manager:latest
    container_name: devpilot-sandbox-manager
    ports:
      - "8090:8090"
    volumes:
      # Docker Desktop (WSL2 backend) exposes the daemon via the Unix socket inside the Linux VM.
      # This works for both WSL2 and Hyper-V backends.
      - /var/run/docker.sock:/var/run/docker.sock
      - ../../../certs:/certs:ro
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
