apiVersion: apps/v1
kind: Deployment
metadata:
  name: devpilot-backend
  namespace: devpilot
  labels:
    app: devpilot-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devpilot-backend
  template:
    metadata:
      labels:
        app: devpilot-backend
    spec:
      containers:
      - name: backend
        image: ghcr.io/YOUR_ORG/devpilot-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        # All secrets injected as environment variables from K8s Secret.
        # ASP.NET Core reads VPS__ManagerApiKey as VPS:ManagerApiKey automatically.
        envFrom:
        - secretRef:
            name: backend-secrets
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: VPS__Enabled
          value: "true"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: devpilot-backend
  namespace: devpilot
  labels:
    app: devpilot-backend
spec:
  type: ClusterIP
  selector:
    app: devpilot-backend
  ports:
  - name: http
    port: 8080
    targetPort: 8080
