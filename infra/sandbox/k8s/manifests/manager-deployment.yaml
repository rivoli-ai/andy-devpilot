apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-manager
  namespace: sandboxes
  labels:
    app: sandbox-manager
spec:
  replicas: 1
  # Single replica: avoid long "old replica pending termination" during RollingUpdate
  # (Flask/Werkzeug can be slow to exit on SIGTERM). Recreate = stop old, then start new.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sandbox-manager
  template:
    metadata:
      labels:
        app: sandbox-manager
    spec:
      terminationGracePeriodSeconds: 15
      serviceAccountName: sandbox-manager
      containers:
      - name: manager
        image: ghcr.io/YOUR_ORG/devpilot-manager:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8090
        envFrom:
        - secretRef:
            name: manager-secrets
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8090
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8090
          initialDelaySeconds: 10
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: sandbox-manager
  namespace: sandboxes
  labels:
    app: sandbox-manager
spec:
  type: NodePort
  selector:
    app: sandbox-manager
  ports:
  - name: api
    port: 8090
    targetPort: 8090
    nodePort: 30090
