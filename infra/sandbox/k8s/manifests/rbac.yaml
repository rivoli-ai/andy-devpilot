apiVersion: v1
kind: ServiceAccount
metadata:
  name: sandbox-manager
  namespace: sandboxes
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sandbox-manager-role
  namespace: sandboxes
rules:
- apiGroups: [""]
  resources: ["pods", "services"]
  verbs: ["create", "delete", "get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sandbox-manager-rolebinding
  namespace: sandboxes
subjects:
- kind: ServiceAccount
  name: sandbox-manager
  namespace: sandboxes
roleRef:
  kind: Role
  name: sandbox-manager-role
  apiGroup: rbac.authorization.k8s.io
